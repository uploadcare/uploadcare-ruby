# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will download a prebuilt Ruby version, install dependencies and run tests with Rake
# For more information see: https://github.com/marketplace/actions/setup-ruby-jruby-and-truffleruby

name: Ruby

on: [push, pull_request]

jobs:
  test:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version:
          - 3.3
          - 3.4
          - 4.0

    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        bundler: latest
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true
    - name: Run tests
      run: bundle exec rspec
      env:
        UPLOADCARE_PUBLIC_KEY: demopublickey
        UPLOADCARE_SECRET_KEY: demoprivatekey

  style-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        ruby-version:
          - 4.0
    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true
    - name: Fetch base branch
      if: github.event_name == 'pull_request'
      run: git fetch --no-tags --depth=1 origin ${{ github.base_ref }}
    - name: Check codestyle
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          files=$(git diff --name-only --diff-filter=ACMRT origin/${{ github.base_ref }}...HEAD -- '*.rb')
        else
          files=$(git diff --name-only --diff-filter=ACMRT HEAD^ HEAD -- '*.rb')
        fi
        if [ -z "$files" ]; then
          echo "No Ruby files changed"
          exit 0
        fi
        printf '%s\n' "$files" | xargs bundle exec rubocop
