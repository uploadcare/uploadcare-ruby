# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow installs Ruby, runs tests, and runs style checks in a dedicated job.
# For more information see: https://github.com/marketplace/actions/setup-ruby-jruby-and-truffleruby

name: Ruby

on: [push, pull_request]

jobs:
  test:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version:
          - 3.3
          - 3.4
          - 4.0

    steps:
    - uses: actions/checkout@v5
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        bundler: latest
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true
    - name: Run tests
      # Keep test invocation on rake tasks so repository-local pre/post hooks stay centralized.
      run: bundle exec rake spec
      env:
        UPLOADCARE_PUBLIC_KEY: demopublickey
        UPLOADCARE_SECRET_KEY: demosecretkey

  style-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version:
          - 4.0
    steps:
    - uses: actions/checkout@v5
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true
    - name: Check codestyle
      run: bundle exec rubocop
